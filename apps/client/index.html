<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0c0b08" />
    <meta
      name="description"
      content="Cross-format media recommendations grounded in your taste DNA: movies, TV, anime, manga, games, and books."
    />

    <!-- Open Graph / Twitter cards. Used by Slack, Discord, Twitter, LinkedIn,
         iMessage previews. Image is regenerated by `pnpm build:og` from
         scripts/build-og.mjs and committed at apps/client/public/og.png. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Resonance" />
    <meta property="og:title" content="Resonance" />
    <meta
      property="og:description"
      content="Cross-format media recommendations grounded in your taste DNA: movies, TV, anime, manga, games, and books."
    />
    <meta property="og:url" content="https://resonance-client.vercel.app/" />
    <meta
      property="og:image"
      content="https://resonance-client.vercel.app/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Resonance — cross-format media recommendations grounded in your taste DNA." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Resonance" />
    <meta
      name="twitter:description"
      content="Cross-format media recommendations grounded in your taste DNA: movies, TV, anime, manga, games, and books."
    />
    <meta
      name="twitter:image"
      content="https://resonance-client.vercel.app/og.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter for body sans, Newsreader for editorial body display,
         IBM Plex Mono + Serif Italic for ecosystem chrome (shared across
         Resonance / Constellation / Ensemble per the 2026-05-10 chrome
         harmonization). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:ital,wght@1,400;1,500&display=swap"
    />
    <title>Resonance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
