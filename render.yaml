# Render.com infrastructure for the Resonance backend.
# Deploy by pointing Render at this file: New → Blueprint → connect the repo.
# Secrets (sync: false) must be filled in via the Render dashboard after the
# service is created — they're never committed.

services:
  - type: web
    name: resonance-server
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    # Install pnpm via npm rather than corepack — Render's filesystem makes
    # /usr/bin read-only at runtime, and `corepack enable` tries to symlink
    # there. --force lets npm overwrite stale `pnpx` symlinks left in the
    # build cache from earlier deploy attempts.
    buildCommand: npm install -g --force pnpm@10.13.1 && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @resonance/server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Origin of the deployed Vercel frontend, e.g. https://resonance.vercel.app
      # Comma-separated for multiple environments (preview + prod).
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: IGDB_CLIENT_ID
        sync: false
      - key: IGDB_CLIENT_SECRET
        sync: false
      # Optional — only used for the Steam library import feature. Get a
      # free key at https://steamcommunity.com/dev/apikey.
      - key: STEAM_API_KEY
        sync: false
